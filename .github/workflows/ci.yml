name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Check fmt
        run: cargo fmt --check
      
      - name: Check clippy
        run: cargo clippy --all-features -- -D warnings
      
      - name: Build library
        run: cargo build --lib --features python
      
      - name: Build examples
        run: cargo build --examples

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install maturin
        run: pip install maturin
      
      - name: Build Python package
        run: maturin develop --features python
      
      - name: Test Python import
        run: python -c "import xor_net; print('Import OK'); m = xor_net.QuantizationConfigPy('pack4', 'int4'); print('QuantizationConfigPy OK'); xor_net.init_threads_py(4); print('init_threads OK')"